name: Build iOS IPA

on:
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 安装 Capacitor 环境并创建占位目录
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/ios
        # ✨ 修复点：建一个空的 www 文件夹，随便放个假文件糊弄 Capacitor
        mkdir www
        echo "Linkgo" > www/index.html

    - name: 初始化并配置热更新
      run: |
        # ✨ 修复点：让 Capacitor 只去读那个空的 www 文件夹，不再俄罗斯套娃
        npx cap init Linkgo com.lingshing.linkgo --web-dir www
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.lingshing.linkgo",
          "appName": "Linkgo",
          "webDir": "www",
          "server": {
            "url": "https://lingshing.github.io/Linkgostart/app.html",
            "cleartext": true
          }
        }
        EOF

    - name: 生成 iOS 工程
      run: |
        npx cap add ios
        npx cap sync ios

    - name: 编译无签名 iOS App
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

    - name: 打包为 IPA 文件
      run: |
        mkdir -p Payload
        mv ios/App/build/Release-iphoneos/App.app Payload/
        zip -r Linkgo.ipa Payload

    - name: 上传 IPA 供下载
      uses: actions/upload-artifact@v4
      with:
        name: Linkgo-IPA
        path: Linkgo.ipa
