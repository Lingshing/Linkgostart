name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 安装依赖
      run: |
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6 @capacitor/keyboard@6 \
                    @capacitor/app@6 @capawesome/capacitor-background-task@6 @capacitor/local-notifications@6 \
                    @capacitor-community/background-geolocation @capacitor/splash-screen@6 \
                    @capacitor-community/sqlite@6
        mkdir -p www
        # 下载电容核心 JS 到 www 目录（本地打包）
        curl -L -o www/capacitor.js https://unpkg.com/@capacitor/core@6/dist/capacitor.js
        # 下载 SQLite 插件 JS 到 www 目录（本地打包）
        curl -L -o www/plugin-sqlite.js https://cdn.jsdelivr.net/npm/@capacitor-community/sqlite@6/dist/plugin.js
        # 如果你的仓库根目录有 app.html，复制进去；否则你可以直接将 app.html 放在仓库中
        cp app.html www/app.html

    - name: 初始化并配置热更新
      run: |
        npx cap init Linkgo com.lingshing.linkgo --web-dir www
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.lingshing.linkgo",
          "appName": "Linkgo",
          "webDir": "www",
          "backgroundColor": "#FFFFFF",
          "server": {
            "url": "https://lingshing.github.io/Linkgostart/app.html",
            "cleartext": true
          },
          "plugins": {
            "Keyboard": {
              "resize": "Native",
              "resizeOnFullScreen": true
            },
            "SplashScreen": {
              "launchShowDuration": 1500,
              "launchAutoHide": true,
              "backgroundColor": "#FFFFFF",
              "showSpinner": false,
              "splashFullScreen": true,
              "splashImmersive": true,
              "iosSplashCornerRadius": 13,
              "iosSplashImageContentMode": "center"
            }
          }
        }
        EOF

    - name: 生成 iOS 工程与完美圆角图标
      run: |
        npx cap add ios
        npm install @capacitor/assets --save-dev
        mkdir -p assets
        
        sips -s format png linkgo-icon.jpg --out assets/icon.png
        
        python3 -m pip install Pillow --break-system-packages
        
        python3 - <<EOF
        from PIL import Image, ImageDraw
        img = Image.open('assets/icon.png').convert("RGBA")
        size = img.size
        mask = Image.new('L', size, 0)
        draw = ImageDraw.Draw(mask)
        r = int(size[0] * 0.225)
        draw.rounded_rectangle((0, 0, size[0], size[1]), radius=r, fill=255)
        img.putalpha(mask)
        img.save('assets/icon.png')
        EOF
        
        npx @capacitor/assets generate --ios
        npx cap sync ios
        
        # 权限注入
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string linkgo" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string location" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string '需要使用定位服务以保持后台连接'" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '需要使用定位服务以保持后台连接'" ios/App/App/Info.plist || true

    - name: 编译无签名 iOS App
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath derived_data CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

    - name: 打包为 IPA 文件
      run: |
        mkdir -p Payload
        APP_PATH=$(find ios/App/derived_data -name "App.app" -type d | head -n 1)
        mv "$APP_PATH" Payload/
        zip -r Linkgo.ipa Payload

    - name: 上传 IPA 供下载
      uses: actions/upload-artifact@v4
      with:
        name: Linkgo-IPA
        path: Linkgo.ipa
