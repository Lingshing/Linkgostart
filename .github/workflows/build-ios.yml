name: Build iOS IPA

on:
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 安装 Capacitor 环境、键盘插件并创建占位目录
      run: |
        npm init -y
        # ✨ 加入了官方 geolocation 插件用于定位保活
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6 @capacitor/keyboard@6 @capacitor/app@6 @capawesome/capacitor-background-task@6 @capacitor/local-notifications@6 @capacitor-community/background-geolocation        mkdir www
        echo "Linkgo" > www/index.html

    - name: 初始化并配置热更新
      run: |
        npx cap init Linkgo com.lingshing.linkgo --web-dir www
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.lingshing.linkgo",
          "appName": "Linkgo",
          "webDir": "www",
          "server": {
            "url": "https://lingshing.github.io/Linkgostart/app.html",
            "cleartext": true
          },
          "plugins": {
            "Keyboard": {
              "resize": "Native",
              "resizeOnFullScreen": true
            }
          }
        }
        EOF

    - name: 生成 iOS 工程与自动切图标 (含无感定位保活修复)
      run: |
        npx cap add ios
        
        npm install @capacitor/assets --save-dev
        mkdir assets
        sips -s format png linkgo-icon.jpg --out assets/icon.png
        npx @capacitor/assets generate --ios
        
        npx cap sync ios
        
        # ✨ 注册专属唤醒协议
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string linkgo" ios/App/App/Info.plist || true
        
        # ✨ 核心魔法：注入后台定位权限 (真正抗击杀的保活必需品)
        /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string location" ios/App/App/Info.plist || true
        
        # ✨ 注入苹果强制要求的定位提示语（必须加，否则一申请权限就闪退）
        /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string '需要使用定位服务以保持后台连接，确保您能随时接收最新消息'" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '需要使用定位服务以保持后台连接，确保您能随时接收最新消息'" ios/App/App/Info.plist || true

    - name: 编译无签名 iOS App
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath derived_data CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

    - name: 打包为 IPA 文件
      run: |
        mkdir -p Payload
        APP_PATH=$(find ios/App/derived_data -name "App.app" -type d | head -n 1)
        mv "$APP_PATH" Payload/
        zip -r Linkgo.ipa Payload

    - name: 上传 IPA 供下载
      uses: actions/upload-artifact@v4
      with:
        name: Linkgo-IPA
        path: Linkgo.ipa
