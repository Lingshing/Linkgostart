name: Build iOS IPA

on:
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 安装 Capacitor 环境、键盘插件并创建占位目录
      run: |
        npm init -y
        # ✨ 偷偷加上了 @capacitor/keyboard@6 这个键盘刺客插件！
        # ✨ 修复：换回了真正的官方神级后台保活插件 @capawesome/capacitor-background-task@6 ！
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6 @capacitor/keyboard@6 @capacitor/app@6 @capawesome/capacitor-background-task@6 @capacitor/local-notifications@6
        mkdir www
        echo "Linkgo" > www/index.html

    - name: 初始化并配置热更新
      run: |
        npx cap init Linkgo com.lingshing.linkgo --web-dir www
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.lingshing.linkgo",
          "appName": "Linkgo",
          "webDir": "www",
          "server": {
            "url": "https://lingshing.github.io/Linkgostart/app.html",
            "cleartext": true
          },
          "plugins": {
            "Keyboard": {
              "resize": "Native",
              "resizeOnFullScreen": true
            }
          }
        }
        EOF

    - name: 生成 iOS 工程与自动切图标 (含保活及混音修复)
      run: |
        npx cap add ios
        
        # ✨ 图标修复魔法：自动把你的 linkgo-icon.jpg 裁切成苹果需要的几十个尺寸！
        npm install @capacitor/assets --save-dev
        mkdir assets
        sips -s format png linkgo-icon.jpg --out assets/icon.png
        npx @capacitor/assets generate --ios
        
        npx cap sync ios
        
        # ✨ 开启 iOS 混音特权魔法！(改用 Python 注入，彻底杜绝 Bash 括号报错)
        python3 -c "
        path = 'ios/App/App/AppDelegate.swift'
        with open(path, 'r') as f: c = f.read()
        c = c.replace('import UIKit', 'import UIKit\nimport AVFoundation')
        audio_code = 'do { try AVAudioSession.sharedInstance().setCategory(.playback, options: .mixWithOthers); try AVAudioSession.sharedInstance().setActive(true) } catch {}\n        return true'
        c = c.replace('return true', audio_code)
        with open(path, 'w') as f: f.write(c)
        "
        
        # ✨ 注册 linkgo:// 专属唤醒协议
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string linkgo" ios/App/App/Info.plist || true
        
        # ✨ 注入后台播放音频权限 (保活必需，不加这个静音音频也白搭！)
        /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" ios/App/App/Info.plist || true
        /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" ios/App/App/Info.plist || true

    - name: 编译无签名 iOS App
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath derived_data CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

    - name: 打包为 IPA 文件
      run: |
        mkdir -p Payload
        APP_PATH=$(find ios/App/derived_data -name "App.app" -type d | head -n 1)
        mv "$APP_PATH" Payload/
        zip -r Linkgo.ipa Payload

    - name: 上传 IPA 供下载
      uses: actions/upload-artifact@v4
      with:
        name: Linkgo-IPA
        path: Linkgo.ipa
