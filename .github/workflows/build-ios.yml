name: Build iOS IPA

on:
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: 获取代码
      uses: actions/checkout@v4

    - name: 安装 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 安装 Capacitor 环境并创建占位目录
      run: |
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6
        mkdir www
        echo "Linkgo" > www/index.html

    - name: 初始化并配置热更新
      run: |
        npx cap init Linkgo com.lingshing.linkgo --web-dir www
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.lingshing.linkgo",
          "appName": "Linkgo",
          "webDir": "www",
          "server": {
            "url": "https://lingshing.github.io/Linkgostart/app.html",
            "cleartext": true
          }
        }
        EOF

    - name: 生成 iOS 工程
      run: |
        npx cap add ios
        npx cap sync ios

    - name: 编译无签名 iOS App
      run: |
        cd ios/App
        # ✨ 终极手段 1：强制将编译产生的所有文件锁死在名为 derived_data 的本地文件夹内
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath derived_data CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

    - name: 打包为 IPA 文件
      run: |
        mkdir -p Payload
        # ✨ 终极手段 2：启动地毯式搜索，把那个隐藏的 App.app 揪出来！
        APP_PATH=$(find ios/App/derived_data -name "App.app" -type d | head -n 1)
        echo "成功揪出目标文件，位置在: $APP_PATH"
        mv "$APP_PATH" Payload/
        zip -r Linkgo.ipa Payload

    - name: 上传 IPA 供下载
      uses: actions/upload-artifact@v4
      with:
        name: Linkgo-IPA
        path: Linkgo.ipa
